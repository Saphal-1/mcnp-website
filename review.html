<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mineleaf | Reviews</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

<header>
    <nav>
        <h1>MINELEAF</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="staff.html">Staff</a></li>
            <li><a href="ranks.html">Ranks</a></li>
            <li><a href="review.html">Reviews</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="container">
        <h2>Community Feed</h2>
        <p>Shared across all players. Use the form below to leave your mark!</p>
    </div>
</section>

<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto 40px auto;">
        <form id="reviewForm" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="reviewName" placeholder="Minecraft IGN" required style="background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); color: white; padding: 12px; border-radius: 8px;">
            <select id="reviewRating" required style="background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); color: white; padding: 12px; border-radius: 8px;">
                <option value="5">★★★★★</option>
                <option value="4">★★★★☆</option>
                <option value="3">★★★☆☆</option>
                <option value="2">★★☆☆☆</option>
                <option value="1">★☆☆☆☆</option>
            </select>
            <textarea id="reviewMessage" placeholder="Your review..." required style="background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); color: white; padding: 12px; border-radius: 8px;"></textarea>
            <button type="submit" class="ip-box" style="width: 100%; color: white;">POST REVIEW</button>
        </form>
    </div>

    <div id="reviewsContainer" class="card-grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
